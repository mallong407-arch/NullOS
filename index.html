<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NullOS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d0f;--surface:rgba(255,255,255,0.06);--surface2:rgba(255,255,255,0.1);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#f0f0f0;--muted:#888;--accent:#7eb8f7;--accent2:#a78bfa;
  --red:#ff5f57;--yellow:#febc2e;--green:#28c840;
  --sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--bar-h:44px;
}
html,body{height:100%;overflow:hidden;font-family:var(--sans);background:var(--bg);color:var(--text);user-select:none;}
#boot{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.8s;}
#boot.fade{opacity:0;pointer-events:none;}
.boot-logo{font-family:var(--mono);font-size:32px;font-weight:300;letter-spacing:0.3em;color:#fff;margin-bottom:48px;opacity:0;animation:fadeUp 1s 0.3s forwards;}
.boot-bar{width:180px;height:2px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.boot-fill{height:100%;background:#fff;border-radius:2px;width:0;animation:bootLoad 2.5s 0.5s ease-out forwards;}
@keyframes bootLoad{0%{width:0}60%{width:70%}80%{width:85%}100%{width:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
#desktop{position:fixed;inset:0;overflow:hidden;display:flex;flex-direction:column;background-size:cover;background-position:center;}
.wp-1{background:radial-gradient(ellipse at 20% 50%,#1a1040,transparent 60%),radial-gradient(ellipse at 80% 20%,#0a2040,transparent 55%),radial-gradient(ellipse at 60% 80%,#0d1a30,transparent 50%),#080810;}
.wp-2{background:radial-gradient(ellipse at 30% 40%,#1a0a20,transparent 60%),radial-gradient(ellipse at 70% 70%,#200a10,transparent 55%),#100808;}
.wp-3{background:radial-gradient(ellipse at 50% 30%,#0a1a10,transparent 60%),radial-gradient(ellipse at 30% 70%,#0a2015,transparent 55%),#080f08;}
.wp-4{background:radial-gradient(ellipse at 60% 40%,#1a1400,transparent 60%),radial-gradient(ellipse at 20% 70%,#201000,transparent 55%),#100e00;}
.wp-5{background:radial-gradient(ellipse at 40% 50%,#0a0a2a,transparent 60%),radial-gradient(ellipse at 80% 30%,#0a1530,transparent 55%),#050510;}
#menubar{height:var(--bar-h);flex-shrink:0;background:rgba(10,10,16,0.75);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;z-index:100;}
.mb-logo{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:0.1em;color:var(--text);padding:0 12px;}
.mb-sep{width:1px;height:20px;background:var(--border);margin:0 4px;}
.mb-item{padding:0 10px;height:100%;display:flex;align-items:center;font-size:13px;color:var(--muted);cursor:pointer;border-radius:6px;transition:all 0.15s;}
.mb-item:hover{background:var(--surface);color:var(--text);}
.mb-right{margin-left:auto;}
#clock{font-family:var(--mono);font-size:12px;color:var(--text);padding:0 12px;opacity:0.8;}
#desktop-area{flex:1;position:relative;overflow:hidden;}
.desk-icon{position:absolute;display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px;border-radius:10px;cursor:pointer;width:80px;transition:background 0.15s;}
.desk-icon:hover{background:rgba(255,255,255,0.06);}
.desk-icon.selected{background:rgba(126,184,247,0.15);}
.desk-icon .icon-img{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px);box-shadow:0 4px 16px rgba(0,0,0,0.3);transition:transform 0.15s;}
.desk-icon:hover .icon-img{transform:scale(1.05);}
.desk-icon .icon-label{font-size:11px;color:var(--text);text-align:center;text-shadow:0 1px 4px rgba(0,0,0,0.8);white-space:nowrap;}
#ctx-menu{position:fixed;z-index:5000;background:rgba(18,18,26,0.97);border:1px solid var(--border2);border-radius:10px;padding:4px;min-width:210px;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,0.5);display:none;}
.ctx-item{padding:7px 12px;border-radius:6px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--text);transition:background 0.1s;}
.ctx-item:hover{background:var(--surface2);}
.ctx-item.danger{color:var(--red);}
.ctx-sep{height:1px;background:var(--border);margin:3px 0;}
.window{position:absolute;background:rgba(14,14,20,0.93);border:1px solid var(--border2);border-radius:14px;backdrop-filter:blur(30px);box-shadow:0 24px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.04);display:flex;flex-direction:column;min-width:320px;min-height:200px;overflow:hidden;transition:box-shadow 0.2s;}
.window.active{box-shadow:0 32px 100px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.08);}
.window.minimized{display:none;}
.win-titlebar{height:44px;flex-shrink:0;display:flex;align-items:center;padding:0 14px;gap:10px;cursor:move;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02);}
.win-btns{display:flex;gap:8px;flex-shrink:0;}
.win-btn{width:14px;height:14px;border-radius:50%;border:none;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.win-btn .bi{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:1;font-style:normal;font-weight:900;line-height:1;pointer-events:none;}
.win-close{background:var(--red);}
.win-close .bi{font-size:8px;color:rgba(80,0,0,0.7);}
.win-min{background:var(--yellow);}
.win-min .bi{font-size:10px;color:rgba(80,50,0,0.6);}
.win-max{background:var(--green);}
.win-max .bi{font-size:9px;color:rgba(0,50,0,0.6);}
.win-title{flex:1;text-align:center;font-size:13px;font-weight:500;color:var(--muted);pointer-events:none;}
.win-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.resize-handle{position:absolute;bottom:0;right:0;width:16px;height:16px;cursor:se-resize;}
#dock{position:absolute;bottom:10px;left:50%;transform:translateX(-50%) translateY(0);background:rgba(20,20,28,0.72);border:1px solid var(--border2);border-radius:18px;backdrop-filter:blur(30px);padding:8px 12px;display:flex;align-items:center;gap:6px;box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:200;transition:transform 0.35s cubic-bezier(0.4,0,0.2,1),opacity 0.35s;}
#dock.hidden{transform:translateX(-50%) translateY(120%);opacity:0;}
.dock-item{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1),background 0.15s;position:relative;}
.dock-item:hover{transform:scale(1.2) translateY(-6px);background:rgba(255,255,255,0.12);}
.dock-item.active::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent);}
.dock-sep{width:1px;height:36px;background:var(--border2);margin:0 4px;}
.fm-sidebar{width:160px;flex-shrink:0;border-right:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;gap:2px;background:rgba(0,0,0,0.2);}
.fm-nav-item{padding:7px 10px;border-radius:7px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--muted);transition:all 0.15s;}
.fm-nav-item:hover,.fm-nav-item.active{background:var(--surface);color:var(--text);}
.fm-nav-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:8px 10px 4px;font-weight:500;}
.fm-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.fm-toolbar{height:42px;flex-shrink:0;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;}
.fm-btn{padding:5px 10px;border-radius:6px;font-size:12px;font-family:var(--sans);background:var(--surface);border:1px solid var(--border);color:var(--text);cursor:pointer;transition:all 0.15s;}
.fm-btn:hover{background:var(--surface2);}
.fm-path{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;}
.fm-grid{flex:1;overflow-y:auto;padding:16px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;}
.fm-item{width:80px;display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 4px;border-radius:8px;cursor:pointer;transition:background 0.15s;}
.fm-item:hover{background:var(--surface);}
.fm-item.selected{background:rgba(126,184,247,0.15);}
.fm-item-icon{font-size:32px;line-height:1;}
.fm-item-name{font-size:11px;text-align:center;color:var(--text);word-break:break-word;line-height:1.3;}
.fm-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;font-style:italic;}
.browser-bar{height:46px;flex-shrink:0;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:7px;background:rgba(0,0,0,0.25);}
.br-nav{width:28px;height:28px;border-radius:7px;border:none;background:var(--surface);color:var(--text);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background 0.15s;flex-shrink:0;}
.br-nav:hover{background:var(--surface2);}
.br-nav:disabled{opacity:0.3;cursor:default;}
.br-url{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none;transition:border-color 0.2s;}
.br-url:focus{border-color:var(--accent);}
.br-go{padding:7px 14px;border-radius:7px;border:none;background:var(--accent);color:#000;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;}
.br-iframe{flex:1;width:100%;border:none;background:#fff;}
.br-blocked{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);padding:32px;text-align:center;}
.br-iframe{flex:1;width:100%;border:none;background:#fff;}
.br-blocked .big{font-size:44px;}
.br-blocked h3{color:var(--text);font-size:15px;}
.br-blocked p{font-size:12px;line-height:1.6;max-width:340px;}
.br-blocked .open-link{color:var(--accent);cursor:pointer;text-decoration:underline;font-size:13px;}
.search-home{display:flex;flex-direction:column;align-items:center;padding:48px 24px 24px;gap:24px;}
.s-logo{font-family:var(--mono);font-size:34px;font-weight:300;letter-spacing:0.3em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.s-bar{width:100%;max-width:480px;display:flex;align-items:center;background:var(--surface);border:1px solid var(--border2);border-radius:28px;padding:0 16px;gap:10px;transition:border-color 0.2s,box-shadow 0.2s;}
.s-bar:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(126,184,247,0.1);}
.s-bar input{flex:1;background:none;border:none;outline:none;font-family:var(--sans);font-size:15px;color:var(--text);padding:13px 0;}
.s-bar input::placeholder{color:var(--muted);}
.s-btn{background:var(--accent);border:none;border-radius:20px;padding:7px 16px;font-family:var(--sans);font-size:13px;color:#000;cursor:pointer;font-weight:600;flex-shrink:0;}
.shortcuts{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.sc{padding:8px 16px;border-radius:20px;background:var(--surface);border:1px solid var(--border);font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
.sc:hover{background:var(--surface2);color:var(--text);}
.terminal{flex:1;background:#050508;padding:14px;overflow-y:auto;font-family:var(--mono);font-size:13px;line-height:1.7;color:#c8d3e0;}
.t-line{display:flex;gap:6px;}
.t-prompt{color:var(--accent);flex-shrink:0;}
.t-out{color:#c8d3e0;white-space:pre-wrap;}
.t-err{color:var(--red);}
.t-input{flex:1;background:none;border:none;outline:none;font-family:var(--mono);font-size:13px;color:#c8d3e0;caret-color:var(--accent);}
.notes-app{flex:1;display:flex;flex-direction:column;}
.notes-tb{height:42px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;}
.notes-ed{flex:1;background:none;border:none;outline:none;resize:none;font-family:var(--sans);font-size:14px;line-height:1.7;color:var(--text);padding:20px;overflow-y:auto;}
.notes-ed::placeholder{color:var(--muted);}
.settings-app{flex:1;overflow-y:auto;padding:24px;}
.s-section{margin-bottom:28px;}
.s-title{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;font-weight:500;}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:10px;background:var(--surface);margin-bottom:4px;}
.wp-grid{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.wp-swatch{width:80px;height:50px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s,transform 0.15s;flex-shrink:0;}
.wp-swatch:hover{transform:scale(1.05);}
.wp-swatch.active{border-color:var(--accent);}
.wp-upload{width:80px;height:50px;border-radius:8px;cursor:pointer;border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:22px;transition:all 0.15s;flex-shrink:0;}
.wp-upload:hover{border-color:var(--accent);background:var(--surface);}
.notif{position:fixed;top:54px;right:14px;z-index:8000;background:rgba(18,18,26,0.97);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;min-width:240px;max-width:300px;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,0.4);display:flex;gap:10px;align-items:flex-start;animation:slideIn 0.3s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.n-icon{font-size:18px;flex-shrink:0;}
.n-title{font-size:13px;font-weight:500;margin-bottom:2px;}
.n-body{font-size:12px;color:var(--muted);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px;}
</style>
</head>
<body>
<div id="boot"><div class="boot-logo">NULL OS</div><div class="boot-bar"><div class="boot-fill"></div></div></div>
<div id="desktop" class="wp-1">
  <div id="menubar">
    <div class="mb-logo">⬡ NULL</div><div class="mb-sep"></div>
    <div class="mb-item" onclick="openApp('files')">Files</div>
    <div class="mb-item" onclick="openApp('browser')">Browser</div>
    <div class="mb-item" onclick="openApp('notes')">Notes</div>
    <div class="mb-item" onclick="openApp('terminal')">Terminal</div>
    <div class="mb-item" onclick="openApp('settings')">Settings</div>
    <div class="mb-right"><div id="clock"></div></div>
  </div>
  <div id="desktop-area" oncontextmenu="showCtx(event,'desktop')" ondblclick="deskDblClick(event)"></div>
  <div id="dock">
    <div class="dock-item" title="Files" onclick="openApp('files')" id="dock-files">📁</div>
    <div class="dock-item" title="Browser" onclick="openApp('browser')" id="dock-browser">🌐</div>
    <div class="dock-item" title="Notes" onclick="openApp('notes')" id="dock-notes">📝</div>
    <div class="dock-item" title="Terminal" onclick="openApp('terminal')" id="dock-terminal">⬛</div>
    <div class="dock-sep"></div>
    <div class="dock-item" title="Settings" onclick="openApp('settings')" id="dock-settings">⚙️</div>
    <div class="dock-item" title="Trash" onclick="openApp('trash')" id="dock-trash">🗑️</div>
  </div>
</div>
<div id="ctx-menu"></div>
<input type="file" id="wp-picker" accept="image/*" style="display:none" onchange="applyWallpaperFile(event)">
<script>
let fs=JSON.parse(localStorage.getItem('nos_fs')||'null')||{home:[{name:'Welcome.txt',type:'file',content:'Welcome to NullOS!\n\nDouble-click files to open.\nRight-click the desktop for options.\n\nEnjoy!'},{name:'Ideas',type:'folder',children:[]},{name:'Downloads',type:'folder',children:[]}],trash:[]};
let curPath='home',wZ=100,wins={},tHist=[],tHIdx=-1,bHist=[],bHIdx=-1,notesVal=localStorage.getItem('nos_notes')||'';
function saveFS(){localStorage.setItem('nos_fs',JSON.stringify(fs));}

// BOOT
setTimeout(()=>{document.getElementById('boot').classList.add('fade');setTimeout(()=>document.getElementById('boot').remove(),900);notify('NullOS','Welcome back.','⬡');},3200);

// CLOCK
function tick(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+' '+n.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
tick();setInterval(tick,1000);

// NOTIFY
let _nt;
function notify(title,body,icon='🔔'){const o=document.querySelector('.notif');if(o)o.remove();const el=document.createElement('div');el.className='notif';el.innerHTML=`<div class="n-icon">${icon}</div><div><div class="n-title">${title}</div><div class="n-body">${body}</div></div>`;document.body.appendChild(el);clearTimeout(_nt);_nt=setTimeout(()=>el.remove(),3500);}

// CONTEXT MENU
function showCtx(e,type,data=null){
  e.preventDefault();e.stopPropagation();
  const m=document.getElementById('ctx-menu');
  const defs={
    desktop:[
      {i:'📁',l:'New Folder',a:newFolder},
      {i:'📄',l:'New File',a:newFile},
      {sep:true},
      {i:'🖼️',l:'Set Wallpaper from File',a:()=>document.getElementById('wp-picker').click()},
      {sep:true},
      {i:'⚙️',l:'Settings',a:()=>openApp('settings')},
    ],
    'fm-item':[
      {i:'📖',l:'Open',a:()=>data.type==='folder'?fmNav(data.name):openFile(data)},
      {i:'✏️',l:'Rename',a:()=>renameItem(data)},
      {sep:true},
      {i:'🗑️',l:'Move to Trash',a:()=>trashItem(data),d:true},
    ],
    'trash-item':[
      {i:'↩️',l:'Restore',a:()=>restoreItem(data)},
      {i:'❌',l:'Delete Forever',a:()=>delForever(data),d:true},
    ],
  };
  const items=defs[type]||[];
  m.innerHTML=items.map(x=>x.sep?'<div class="ctx-sep"></div>':`<div class="ctx-item${x.d?' danger':''}">${x.i} ${x.l}</div>`).join('');
  const acts=items.filter(x=>!x.sep);
  m.querySelectorAll('.ctx-item').forEach((b,i)=>b.addEventListener('click',()=>{acts[i].a();hideCtx();}));
  m.style.cssText=`display:block;left:${Math.min(e.clientX,window.innerWidth-220)}px;top:${Math.min(e.clientY,window.innerHeight-items.length*34-10)}px`;
}
function hideCtx(){document.getElementById('ctx-menu').style.display='none';}
document.addEventListener('click',hideCtx);
document.addEventListener('keydown',e=>e.key==='Escape'&&hideCtx());

// WINDOW MANAGER
function mkWin(id,title,w,h,x,y,html){
  if(wins[id]){focusWin(id);return wins[id];}
  const win=document.createElement('div');
  win.className='window';win.id='w-'+id;
  win.style.cssText=`width:${w}px;height:${h}px;left:${Math.max(4,x)}px;top:${Math.max(4,y)}px;z-index:${++wZ}`;
  win.innerHTML=`<div class="win-titlebar" onmousedown="dragStart(event,'${id}')">
    <div class="win-btns">
      <button class="win-btn win-close" onclick="closeWin('${id}')"><i class="bi">✕</i></button>
      <button class="win-btn win-min" onclick="minWin('${id}')"><i class="bi">–</i></button>
      <button class="win-btn win-max" onclick="maxWin('${id}')"><i class="bi">⤢</i></button>
    </div>
    <div class="win-title">${title}</div>
    <div style="width:46px"></div>
  </div>
  <div class="win-body" id="wb-${id}">${html}</div>
  <div class="resize-handle" onmousedown="resStart(event,'${id}')"></div>`;
  document.getElementById('desktop-area').appendChild(win);
  win.addEventListener('mousedown',()=>focusWin(id));
  wins[id]={el:win,minimized:false,prev:null};
  dockMark(id,true);return wins[id];
}
function focusWin(id){if(!wins[id])return;wins[id].el.style.zIndex=++wZ;document.querySelectorAll('.window').forEach(w=>w.classList.remove('active'));wins[id].el.classList.add('active');}
function closeWin(id){if(!wins[id])return;wins[id].el.remove();delete wins[id];dockMark(id,false);}
function minWin(id){if(!wins[id])return;wins[id].el.classList.add('minimized');wins[id].minimized=true;}
function maxWin(id){
  if(!wins[id])return;const win=wins[id].el;
  if(wins[id].prev){const p=wins[id].prev;win.style.left=p.l;win.style.top=p.t;win.style.width=p.w;win.style.height=p.h;wins[id].prev=null;}
  else{wins[id].prev={l:win.style.left,t:win.style.top,w:win.style.width,h:win.style.height};const a=document.getElementById('desktop-area');win.style.cssText+=`;left:4px;top:4px;width:${a.offsetWidth-8}px;height:${a.offsetHeight-8}px`;}
}
function dockMark(id,on){const el=document.getElementById('dock-'+id);if(el)el.classList.toggle('active',on);}
let dSt=null,rSt=null;
function dragStart(e,id){if(e.target.closest('.win-btn'))return;const w=wins[id]?.el;if(!w)return;focusWin(id);dSt={id,sx:e.clientX-w.offsetLeft,sy:e.clientY-w.offsetTop};}
function resStart(e,id){e.stopPropagation();const w=wins[id]?.el;if(!w)return;rSt={id,sx:e.clientX,sy:e.clientY,w:w.offsetWidth,h:w.offsetHeight};}
document.addEventListener('mousemove',e=>{
  if(dSt){const w=wins[dSt.id]?.el;if(!w)return;const a=document.getElementById('desktop-area');w.style.left=Math.max(0,Math.min(e.clientX-dSt.sx,a.offsetWidth-80))+'px';w.style.top=Math.max(0,Math.min(e.clientY-dSt.sy,a.offsetHeight-44))+'px';}
  if(rSt){const w=wins[rSt.id]?.el;if(!w)return;w.style.width=Math.max(380,rSt.w+(e.clientX-rSt.sx))+'px';w.style.height=Math.max(250,rSt.h+(e.clientY-rSt.sy))+'px';}
});
document.addEventListener('mouseup',()=>{dSt=null;rSt=null;});

// OPEN APP
function openApp(name){
  if(wins[name]){if(wins[name].minimized){wins[name].el.classList.remove('minimized');wins[name].minimized=false;}focusWin(name);return;}
  const a=document.getElementById('desktop-area');
  const cx=a.offsetWidth/2+(Math.random()-.5)*60,cy=a.offsetHeight/2+(Math.random()-.5)*40;
  ({files:openFiles,trash:openFiles,browser:openBrowser,notes:openNotes,terminal:openTerm,settings:openSettings})[name]?.(cx,cy,name);
}

function fmNav(p){curPath=p;renderFM();document.querySelectorAll('.fm-nav-item').forEach(e=>e.classList.remove('active'));const n=document.getElementById('fn-'+p);if(n)n.classList.add('active');}
function getFSItems(){if(curPath==='trash')return fs.trash;if(curPath==='home')return fs.home;const f=fs.home.find(i=>i.name===curPath&&i.type==='folder');return f?f.children:[];}
function renderFM(){
  const g=document.getElementById('fm-grid');if(!g)return;
  const eb=document.getElementById('empty-trash-btn');const pe=document.getElementById('fm-path');
  if(pe)pe.textContent='~/'+curPath;if(eb)eb.style.display=curPath==='trash'?'':'none';
  const items=getFSItems();
  if(!items.length){g.innerHTML=`<div class="fm-empty">${curPath==='trash'?'Trash is empty':'No files here'}</div>`;return;}
  g.innerHTML='';
  items.forEach(item=>{
    const el=document.createElement('div');el.className='fm-item';
    el.innerHTML=`<div class="fm-item-icon">${item.type==='folder'?'📁':fIcon(item.name)}</div><div class="fm-item-name">${item.name}</div>`;

function fIcon(n){const e=n.split('.').pop().toLowerCase();return{txt:'📄',md:'📄',jpg:'🖼️',png:'🖼️',gif:'🖼️',svg:'🖼️',mp3:'🎵',wav:'🎵',mp4:'🎬',mov:'🎬',zip:'📦',rar:'📦',html:'💻',js:'💻',css:'💻',py:'💻'}[e]||'📄';}
function openFile(item){

function newFolder(){const n=prompt('Folder name:');if(!n)return;(curPath==='home'?fs.home:(fs.home.find(i=>i.name===curPath&&i.type==='folder')?.children||fs.home)).push({name:n,type:'folder',children:[]});saveFS();renderFM();notify('Files',`"${n}" created`,'📁');}
function newFile(){const n=prompt('File name:');if(!n)return;const it={name:n,type:'file',content:''};(curPath==='home'?fs.home:(fs.home.find(i=>i.name===curPath&&i.type==='folder')?.children||fs.home)).push(it);saveFS();renderFM();notify('Files',`"${n}" created`,'📄');}
function trashItem(item){const arr=getFSItems();const i=arr.indexOf(item);if(i<0)return;arr.splice(i,1);item._from=curPath;fs.trash.push(item);saveFS();renderFM();notify('Files',`"${item.name}" trashed`,'🗑️');}
function restoreItem(item){const i=fs.trash.indexOf(item);if(i<0)return;fs.trash.splice(i,1);const dest=item._from||'home';(dest==='home'?fs.home:(fs.home.find(x=>x.name===dest&&x.type==='folder')?.children||fs.home)).push(item);saveFS();renderFM();notify('Files',`"${item.name}" restored`,'↩️');}
function delForever(item){if(!confirm(`Delete "${item.name}" forever?`))return;const i=fs.trash.indexOf(item);if(i<0)return;fs.trash.splice(i,1);saveFS();renderFM();}
function emptyTrash(){if(!fs.trash.length){notify('Trash','Already empty','🗑️');return;}if(!confirm('Permanently delete all?'))return;fs.trash=[];saveFS();renderFM();notify('Trash','Emptied','🗑️');}
function renameItem(item){const n=prompt('New name:',item.name);if(!n)return;item.name=n;saveFS();renderFM();}

const PROXIES=[
  url=>`https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url=>`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url=>`https://thingproxy.freeboard.io/fetch/${url}`,
];
let brProxyIdx=0, brCurrentUrl='';

function openBrowser(cx,cy){

  const body=`<div style="display:flex;flex-direction:column;height:100%;overflow:hidden;">

function brNav(){
  let v=(document.getElementById('br-url')?.value||'').trim();if(!v)return;
  if(!v.startsWith('http')&&!v.includes('.'))v='https://duckduckgo.com/?q='+encodeURIComponent(v);
  else if(!v.startsWith('http'))v='https://'+v;
  brLoadUrl(v);
}

function brLoadUrl(url){
  brCurrentUrl=url;brProxyIdx=0;
  bHist=bHist.slice(0,bHIdx+1);bHist.push(url);bHIdx=bHist.length-1;brUpdateNav();
  const ui=document.getElementById('br-url');if(ui)ui.value=url;
  brRenderIframe(PROXIES[0](url), url);
}

function brRenderIframe(src, originalUrl){
  const view=document.getElementById('br-view');if(!view)return;
  const home=document.getElementById('br-home');if(home)home.style.display='none';
  // Remove old iframe/blocked if any
  const old=document.getElementById('br-iframe');if(old)old.remove();
  const oldb=document.getElementById('br-blocked');if(oldb)oldb.remove();

  const iframe=document.createElement('iframe');
  iframe.id='br-iframe';iframe.className='br-iframe';
  iframe.style.cssText='flex:1;width:100%;border:none;background:#fff;';
  iframe.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation');
  iframe.src=src;

  const blocked=document.createElement('div');
  blocked.id='br-blocked';blocked.className='br-blocked';blocked.style.display='none';
  blocked.innerHTML=`<div style="font-size:44px">🚫</div>
    <h3 style="color:var(--text);font-size:15px;">This site blocks all embedding</h3>
    <p style="font-size:12px;color:var(--muted);max-width:340px;text-align:center;line-height:1.6;">
      Google, YouTube, and a few others reject even proxy requests.<br>
      You can still open it in a real tab.
    </p>
    <button class="br-go" style="margin-top:8px" onclick="window.open('${originalUrl.replace(/'/g,"\\'")}','_blank')">Open in Chrome tab ↗</button>`;

  view.appendChild(iframe);
  view.appendChild(blocked);

  let timedOut=false;
  const timeout=setTimeout(()=>{timedOut=true;brShowBlocked();},8000);

  iframe.onload=()=>{
    clearTimeout(timeout);
    if(timedOut)return;
    try{
      const d=iframe.contentDocument||iframe.contentWindow?.document;
      if(d&&(!d.body||d.body.innerHTML.trim()==='')){brShowBlocked();}
    }catch(e){/* cross-origin = loaded fine */}
  };
  iframe.onerror=()=>{clearTimeout(timeout);brShowBlocked();};
}

function brShowBlocked(){
  // Try next proxy automatically before giving up
  brProxyIdx++;
  if(brProxyIdx<PROXIES.length){
    brRenderIframe(PROXIES[brProxyIdx](brCurrentUrl), brCurrentUrl);
    return;
  }
  const f=document.getElementById('br-iframe'),b=document.getElementById('br-blocked');
  if(f)f.style.display='none';if(b)b.style.display='flex';
}

function brTryNextProxy(){
  if(!brCurrentUrl)return;
  brProxyIdx=(brProxyIdx+1)%PROXIES.length;
  brRenderIframe(PROXIES[brProxyIdx](brCurrentUrl),brCurrentUrl);
  notify('Browser',`Trying proxy ${brProxyIdx+1}/${PROXIES.length}`,'🔀');
}

function brBack(){
  if(bHIdx>0){bHIdx--;brUpdateNav();const url=bHist[bHIdx];brCurrentUrl=url;brProxyIdx=0;
  if(document.getElementById('br-url'))document.getElementById('br-url').value=url;
  brRenderIframe(PROXIES[0](url),url);}
}
function brFwd(){
  if(bHIdx<bHist.length-1){bHIdx++;brUpdateNav();const url=bHist[bHIdx];brCurrentUrl=url;brProxyIdx=0;
  if(document.getElementById('br-url'))document.getElementById('br-url').value=url;
  brRenderIframe(PROXIES[0](url),url);}
}
function brRefresh(){if(brCurrentUrl){brProxyIdx=0;brRenderIframe(PROXIES[0](brCurrentUrl),brCurrentUrl);}}
function brUpdateNav(){const b=document.getElementById('br-back'),f=document.getElementById('br-fwd');if(b)b.disabled=bHIdx<=0;if(f)f.disabled=bHIdx>=bHist.length-1;}

function openTerm(cx,cy){
  const w=560,h=380;
  mkWin('terminal','Terminal',w,h,cx-w/2,cy-h/2,`<div class="terminal" id="tout"><div class="t-line"><span class="t-out" style="color:var(--accent)">NullOS Terminal v1.0</span></div><div class="t-line"><span class="t-out" style="color:var(--muted)">Type 'help' for commands.</span></div></div><div style="border-top:1px solid var(--border);padding:8px 14px;display:flex;gap:6px;align-items:center;background:rgba(0,0,0,0.3);"><span class="t-prompt">❯</span><input class="t-input" id="tin" autocomplete="off" onkeydown="tKey(event)"></div>`);
  setTimeout(()=>document.getElementById('tin')?.focus(),100);
}
function tKey(e){
  if(e.key==='Enter'){tRun(e.target.value.trim());e.target.value='';tHIdx=-1;}
  if(e.key==='ArrowUp'){tHIdx=Math.min(tHIdx+1,tHist.length-1);e.target.value=tHist[tHIdx]||'';}
  if(e.key==='ArrowDown'){tHIdx=Math.max(tHIdx-1,-1);e.target.value=tHIdx<0?'':tHist[tHIdx];}
}
function tPrint(txt,cls='t-out'){const o=document.getElementById('tout');if(!o)return;const l=document.createElement('div');l.className='t-line';l.innerHTML=`<span class="${cls}">${txt}</span>`;o.appendChild(l);o.scrollTop=o.scrollHeight;}
function tRun(raw){
  if(!raw)return;tHist.unshift(raw);tPrint(`❯ ${raw}`,'t-prompt');
  const[cmd,...args]=raw.trim().split(/\s+/);
  ({
    help:()=>tPrint('Commands: help, ls, clear, date, echo, whoami, open, browse, neofetch'),
    ls:()=>tPrint(fs.home.map(i=>(i.type==='folder'?'📁 ':'📄 ')+i.name).join('  ')||'(empty)'),
    clear:()=>{const o=document.getElementById('tout');if(o)o.innerHTML='';},
    date:()=>tPrint(new Date().toString()),
    echo:()=>tPrint(args.join(' ')),
    whoami:()=>tPrint('user@nullos'),
    open:()=>args[0]?openApp(args[0]):tPrint('Usage: open &lt;app&gt;','t-err'),
    browse:()=>{if(args[0]){openApp('browser');setTimeout(()=>brLoad(args[0].startsWith('http')?args[0]:'https://'+args[0]),500);}else tPrint('Usage: browse &lt;url&gt;','t-err');},
    neofetch:()=>{tPrint(`<span style="color:var(--accent)">  ⬡⬡⬡⬡  </span>  <b>user@nullos</b>`);tPrint(`<span style="color:var(--accent)">⬡⬡⬡⬡⬡⬡⬡⬡</span>  OS: NullOS 1.0`);tPrint(`<span style="color:var(--accent)">⬡⬡⬡⬡⬡⬡⬡⬡</span>  Browser: NullChrome`);tPrint(`<span style="color:var(--accent)">  ⬡⬡⬡⬡  </span>  Files: ${fs.home.length} items`);}
  }[cmd]||(() =>tPrint(`Command not found: ${cmd}`,'t-err')))();
}

function setWP(cls){
  const d=document.getElementById('desktop');
  ['wp-1','wp-2','wp-3','wp-4','wp-5'].forEach(c=>d.classList.remove(c));
  d.classList.add(cls);d.style.backgroundImage='';
  localStorage.setItem('nos_wp',cls);localStorage.removeItem('nos_wp_img');
  document.querySelectorAll('.wp-swatch').forEach(e=>e.classList.toggle('active',e.classList.contains(cls)));
  notify('Settings','Wallpaper updated','🖼️');
}
function applyWallpaperFile(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    const url=ev.target.result;const d=document.getElementById('desktop');
    ['wp-1','wp-2','wp-3','wp-4','wp-5'].forEach(c=>d.classList.remove(c));
    d.style.backgroundImage=`url(${url})`;d.style.backgroundSize='cover';d.style.backgroundPosition='center';
    try{localStorage.setItem('nos_wp_img',url);localStorage.setItem('nos_wp','custom');}catch(err){}
    document.querySelectorAll('.wp-swatch').forEach(e=>e.classList.remove('active'));
    notify('Wallpaper','Custom wallpaper set!','🖼️');
  };
  r.readAsDataURL(file);e.target.value='';
}
function resetFS(){if(!confirm('Reset all files?'))return;fs={home:[{name:'Welcome.txt',type:'file',content:'Welcome to NullOS!'},{name:'Ideas',type:'folder',children:[]},{name:'Downloads',type:'folder',children:[]}],trash:[]};saveFS();notify('Settings','File system reset','🔄');}

const _dock=document.getElementById('dock');
let _dockTimer;
function dockCheck(e){
  const threshold=window.innerHeight-80;
  if(e.clientY>=threshold){
    clearTimeout(_dockTimer);
    _dock.classList.remove('hidden');
  } else {
    clearTimeout(_dockTimer);
    _dockTimer=setTimeout(()=>_dock.classList.add('hidden'),600);
  }
}
document.getElementById('desktop-area').addEventListener('mousemove',dockCheck);
_dock.addEventListener('mouseenter',()=>{clearTimeout(_dockTimer);_dock.classList.remove('hidden');});
_dock.addEventListener('mouseleave',()=>{_dockTimer=setTimeout(()=>_dock.classList.add('hidden'),800);});
// Hide initially after 2s
setTimeout(()=>_dock.classList.add('hidden'),2000);
const _wp=localStorage.getItem('nos_wp'),_wi=localStorage.getItem('nos_wp_img'),_d=document.getElementById('desktop');
if(_wi&&_wp==='custom'){_d.style.backgroundImage=`url(${_wi})`;_d.style.backgroundSize='cover';_d.style.backgroundPosition='center';}
else if(_wp&&_wp!=='custom'){['wp-1','wp-2','wp-3','wp-4','wp-5'].forEach(c=>_d.classList.remove(c));_d.classList.add(_wp);}
</script>
</body>
